<!DOCTYPE html>\n<html lang='en'>\n<head>\n    <meta charset='UTF-8'>\n    <meta name='viewport' content='width=device-width, initial-scale=1.0'>\n    <title>Flappy Bird</title>\n    <style>\n        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #70c5ce; }\n        canvas { border: 2px solid #ffffff; }\n    </style>\n</head>\n<body>\n    <canvas id='flappyBird' width='320' height='480'></canvas>\n    <script>\n        const canvas = document.getElementById('flappyBird');\n        const context = canvas.getContext('2d');\n\n        let bird = {\n            x: 50,\n            y: 150,\n            width: 20,\n            height: 20,\n            gravity: 0.6,\n            lift: -15,\n            velocity: 0\n        };\n\n        let pipes = [];\n        let frameCount = 0;\n\n        function drawBird() {\n            context.fillStyle = '#ff0';\n            context.fillRect(bird.x, bird.y, bird.width, bird.height);\n        }\n\n        function createPipe() {\n            const pipeHeight = Math.random() * (canvas.height / 2);\n            pipes.push({\n                x: canvas.width,\n                top: pipeHeight,\n                bottom: canvas.height - pipeHeight - 100,\n                width: 20\n            });\n        }\n\n        function drawPipes() {\n            context.fillStyle = '#228B22';\n            pipes.forEach(pipe => {\n                context.fillRect(pipe.x, 0, pipe.width, pipe.top);\n                context.fillRect(pipe.x, canvas.height - pipe.bottom, pipe.width, pipe.bottom);\n            });\n        }\n\n        function updatePipes() {\n            pipes.forEach(pipe => {\n                pipe.x -= 2;\n            });\n            if (pipes.length && pipes[0].x < -pipe.width) {\n                pipes.shift();\n            }\n        }\n\n        function checkCollision() {\n            if (bird.y + bird.height >= canvas.height || bird.y <= 0) {\n                resetGame();\n            }\n            pipes.forEach(pipe => {\n                if (bird.x + bird.width > pipe.x && bird.x < pipe.x + pipe.width) {\n                    if (bird.y < pipe.top || bird.y + bird.height > canvas.height - pipe.bottom) {\n                        resetGame();\n                    }\n                }\n            });\n        }\n\n        function resetGame() {\n            bird.y = 150;\n            bird.velocity = 0;\n            pipes = [];\n        }\n\n        document.addEventListener('keydown', () => {\n            bird.velocity += bird.lift;\n        });\n\n        function update() {\n            bird.velocity += bird.gravity;\n            bird.y += bird.velocity;\n            frameCount++;\n            if (frameCount % 75 === 0) {\n                createPipe();\n            }\n            context.clearRect(0, 0, canvas.width, canvas.height);\n            drawBird();\n            drawPipes();\n            updatePipes();\n            checkCollision();\n            requestAnimationFrame(update);\n        }\n        update();\n    </script>\n</body>\n</html>
